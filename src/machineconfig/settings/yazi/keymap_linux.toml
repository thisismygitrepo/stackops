# from https://github.com/Tyarel8/goto-drives.yazi
[[mgr.prepend_keymap]]
on = [ "g", ":" ]
run = "plugin goto-drives"
desc = "Go to drives"

[[mgr.prepend_keymap]]
on   = "v"
run  = "plugin tv-reveal"
desc = "Run tv and reveal result"


[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

# If you also using Yazi on Windows:
[[mgr.prepend_keymap]]
on   = "!"
for  = "windows"
run  = 'shell "powershell.exe" --block'
desc = "Open PowerShell here"


# FROM https://github.com/yazi-rs/plugins/tree/main/toggle-pane.yazi
# keymap.toml
# parent, current, preview
[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"
# keymap.toml


[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = "M"            # whatever key you choose
run = "plugin toggle-pane"
desc = "Toggle preview pane / maximize pane"


# https://yazi-rs.github.io/docs/tips#macos-quick-look
[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = 'shell -- qlmanage -p "$@"'

[[mgr.prepend_keymap]]
on   = "F"
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg fire "$0"'
desc = "Run fire on hovered file"

[[mgr.prepend_keymap]]
on   = ["L", "c"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg msearch "$0"'
desc = "Search contents"
[[mgr.prepend_keymap]]
on   = ["L", "f"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg msearch -f "$0"'
desc = "Search files"
[[mgr.prepend_keymap]]
on   = ["L", "e"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg msearch -e "$0"'
desc = "Search then edit"
[[mgr.prepend_keymap]]
on   = ["L", "s"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg msearch -s "$0"'
desc = "Symantic search"


[[mgr.prepend_keymap]]
on   = "b"
run  = 'shell --block -- bat "$0"'
desc = "bat the file"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "go to repo root"

[[mgr.prepend_keymap]]
on   = ["R", "v"]
run  = 'shell -- code "$0"'
desc = "Read with vscode"

[[mgr.prepend_keymap]]
on   = ["R", "h"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg utils file edit "$0"'
desc = "Read with helix"

[[mgr.prepend_keymap]]
on   = ["R", "s"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg croshell "$0"'
desc = "Read with croshell"
[[mgr.prepend_keymap]]
on   = ["R", "f"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg fire "$0"'
desc = "Read with fire"
[[mgr.prepend_keymap]]
on   = ["R", "F"]
run  = 'shell --block -- $HOME/.config/machineconfig/scripts/wrap_mcfg fire -i "$0"'
desc = "Read with fire interactively"
[[mgr.prepend_keymap]]
on   = ["R", "c"]
run  = 'shell --block -- code "$0"'
desc = "Read with code"

[[mgr.prepend_keymap]]
on   = ["o", "c"]
run  = 'shell --block -- uv run --python 3.14 "$HOME/.config/yazi/scripts/compress_selected.py" __YAZI_HOVERED__ %h __YAZI_SELECTED__ %s'
desc = "compress with ouch"

[[mgr.prepend_keymap]]
on   = ["o", "d"]
run  = 'shell --block -- ouch decompress "$0"'
desc = "decompress with ouch"

[[mgr.prepend_keymap]]
on   = ["o", "s"]
run  = 'shell --block -- gpg --output "$0.gpg" --symmetric "$0"'
desc = "encrypt symmetrically with gpg"

[[mgr.prepend_keymap]]
on   = ["o", "a"]
run  = 'shell --block -- gpg --output "$0.gpg" --default-recipient-self --encrypt "$0"'
desc = "encrypt asymmetrically with gpg"

[[mgr.prepend_keymap]]
on   = ["o", "S"]
run  = "shell --block -- sh -c 'input=\"$1\"; case \"$input\" in (*.gpg) output=\"${input%.gpg}\" ;; (*) echo \"Expected a .gpg file: $input\" >&2; exit 1 ;; esac; gpg --output \"$output\" --decrypt \"$input\"' sh \"$0\""
desc = "decrypt symmetric gpg file"

[[mgr.prepend_keymap]]
on   = ["o", "A"]
run  = "shell --block -- sh -c 'input=\"$1\"; case \"$input\" in (*.gpg) output=\"${input%.gpg}\" ;; (*) echo \"Expected a .gpg file: $input\" >&2; exit 1 ;; esac; gpg --output \"$output\" --decrypt \"$input\"' sh \"$0\""
desc = "decrypt asymmetric gpg file"

[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- echo "$@" | cb cp0', "yank" ]

# DuckDB plugin keymaps for column scrolling
[[mgr.prepend_keymap]]
on = "H"
run = "plugin duckdb -1"
desc = "Scroll one column to the left"

[[mgr.prepend_keymap]]
on = "L"
run = "plugin duckdb +1"
desc = "Scroll one column to the right"

[[mgr.prepend_keymap]]
on = ["g", "o"]
run = "plugin duckdb -open"
desc = "open with duckdb"

[[mgr.prepend_keymap]]
on = ["g", "u"]
run = "plugin duckdb -ui"
desc = "open with duckdb ui"
