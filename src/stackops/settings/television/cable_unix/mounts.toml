[metadata]
name = "mounts"
description = "List mounted filesystems"
requirements = ["df", "awk"]

[source]
command = "if df -hT -P >/dev/null 2>&1; then df -hT -P | awk 'NR > 1 {mount=$7; for (i=8; i<=NF; i++) mount=mount \" \"$i; print mount\"\\t\"$1\"\\t\"$2\"\\t\"$3\"\\t\"$6}'; else df -hP | awk 'NR > 1 {mount=$6; for (i=7; i<=NF; i++) mount=mount \" \"$i; print mount\"\\t\"$1\"\\t-\\t\"$2\"\\t\"$5}'; fi"
display = "{split:\t:0} ({split:\t:2}, {split:\t:4})"
output = "{split:\t:0}"

[preview]
command = "df -hP '{split:\t:0}' 2>/dev/null || df -h '{split:\t:0}'; echo; ls -la '{split:\t:0}' 2>/dev/null | head -20"

[keybindings]
enter = "actions:cd"

[actions.cd]
description = "Open a shell in the selected mount point"
command = "cd '{split:\t:0}' && $SHELL"
shell = "bash"
mode = "execute"
