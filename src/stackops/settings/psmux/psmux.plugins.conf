# Run install-ppm.ps1 once, then use Prefix + I / U / M from inside psmux.

set -g @plugin 'psmux-plugins/ppm' # PPM is the plugin manager; it reads all @plugin entries and Prefix + I/U/M installs, updates, or cleans plugins.
set -g @plugin 'psmux-plugins/psmux-sensible' # Loads sensible defaults like vi keys, mouse support, 1-based indexes, and quality-of-life bindings.
set -g @plugin 'psmux-plugins/psmux-battery' # Adds battery status support for psmux, including #{@battery_display} and Prefix + B battery info.
set -g @plugin 'psmux-plugins/psmux-resurrect' # Saves and restores sessions, windows, pane layouts, working dirs, and selected running processes.
set -g @plugin 'psmux-plugins/psmux-continuum' # Adds automatic periodic saves and optional auto-restore on server start; depends on resurrect.

set -g @continuum-save-interval '15' # Auto-save the current environment every 15 minutes; set 0 to disable scheduled saves.
set -g @continuum-restore 'on' # Restore the last resurrect snapshot automatically when the psmux server starts.
set -g @resurrect-dir '~/.psmux/resurrect' # Store resurrect save files under ~/.psmux/resurrect.
set -g @resurrect-processes 'pwsh powershell cmd ssh wsl python python3 uv node npm vim nvim less more tail' # Allow resurrect to restart these space-separated commands after restore.

if-shell 'Test-Path "$HOME/.psmux/plugins/ppm/ppm.ps1"' 'run "~/.psmux/plugins/ppm/ppm.ps1"' '' # If the PPM entry script exists, run it to load installed plugins; otherwise do nothing.
