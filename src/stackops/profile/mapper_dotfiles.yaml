# yaml-language-server: $schema=./mapper_dotfiles.schema.json
# User-defined config file mappings
# os values are explicit YAML lists containing linux, darwin, or windows

# ============ Credentials And Secrets ============
git:
  gitconfig:
    original: ~/.gitconfig
    self_managed: ~/dotfiles/creds/git/.gitconfig
    os:
    - linux
    - darwin
    - windows
  gitcred:
    original: ~/.git-credentials
    self_managed: ~/dotfiles/creds/git/.git-credentials
    os:
    - linux
    - darwin
    - windows
ssh:
  keys:
    original: ~/.ssh
    self_managed: ~/dotfiles/creds/.ssh
    contents: true
    os:
    - linux
    - darwin
    - windows
gpg:
  keys_unix:
    original: ~/.gnupg
    self_managed: ~/dotfiles/creds/.gnupg
    contents: true
    os:
    - linux
    - darwin
  keys_windows:
    original: ~/AppData/Roaming/gnupg
    self_managed: ~/dotfiles/creds/.gnupg
    contents: true
    os:
    - windows


pypi:
  creds:
    original: ~/.pypirc
    self_managed: ~/dotfiles/creds/msc/.pypirc
    os:
    - linux
    - darwin
    - windows
rclone:
  config_xdg:
    original: ~/.config/rclone/rclone.conf
    self_managed: ~/dotfiles/creds/rclone/rclone.conf
    os:
    - linux
    - darwin
  config_windows:
    original: ~/AppData/Roaming/rclone/rclone.conf
    self_managed: ~/dotfiles/creds/rclone/rclone.conf
    os:
    - windows
cloudflare:
  config:
    original: ~/.cloudflared
    self_managed: ~/dotfiles/creds/cloudflare/.cloudflared
    os:
    - linux
    - darwin
    - windows
ngrok:
