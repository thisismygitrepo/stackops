    self_managed: ~/dotfiles/creds/tokens/ngrok.yml
    os:
    - linux
    - darwin
  config_windows:
    original: ~/AppData/Local/ngrok/ngrok.yml
    self_managed: ~/dotfiles/creds/tokens/ngrok.yml
    os:
    - windows
m365:
  config1:
    original: ~/.cli-m365-msal.json
    self_managed: ~/dotfiles/creds/tokens/.cli-m365-msal.json
    os:
    - linux
    - darwin
    - windows
