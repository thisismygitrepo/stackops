approval_policy = "never"
sandbox_mode = "workspace-write"
allow_login_shell = true
web_search = "live"
project_doc_max_bytes = 32768
project_doc_fallback_filenames = []
mcp_oauth_credentials_store = "auto"

[sandbox_workspace_write]
network_access = true

[features]
multi_agent = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "model-name", "project-root", "git-branch", "context-used", "five-hour-limit"]

[analytics]
enabled = false

[history]
persistence = "none"

[feedback]
enabled = false

[mcp_servers]
