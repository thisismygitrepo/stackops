# yaml-language-server: $schema=./prompts.schema.json
# prompts.yaml used by `agents run-prompt`
# Top-level keys show up in interactive selection.
# Nested keys can be selected via --context-name with dot-path syntax (example: team.backend).
# Each entry can be a plain string or an object with prompt metadata.
# entryExample: {prompt: replace me, description: short label}

ensureLightweightCommands:
  description: we want typer cli files to remain light weight and prevent uncncessary upfront loading.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    $caveman weynan full.
    Please look into every cli typer py file that has (import typer).
    In essense, we want to ensure that those typer cli remain lightweight so user doesn't experience delay.
    We achieve this by,
    * Avoid unncessary import to happen upfront, e.g. if only one command needs it, then the import can occur within that command (not global import)
    * Only include global imports needed to type hint the variables and light weigh modules, and ensuer they come from modules that are lightweight themselves, otherwise some redesign need to occur with those imported files.
    * We want to have both python API and CLI experirence of functions, so, the actual py function must exist somewhere, and the cli function is only calling that function internally and passing on (a cli interface to an existing py function).
    Convey those messages to the new agent instances, but its up to you to decide which one is worth working on and which one is already reasonably optimized, plese don't be overzelous.

    Because the number of files is too big, please spin up another veresion of you (whether you are codex, claude, opencode, copilot etc)
    but not as a sub agent. Use Herdr-managed tabs/windows/panes as directed by the `$workflows` skill and give each agent a clear name matching its task.

    # Instructions for agents:
    * Pass sufficient instructions to them to be able to get the job done
    * let them know that there exist other agents working on similar tasks for other files, so they are no surprised by occasional unexpected change of some shared code upstream.
    * Additionally, tell them to use caveman weynan full skill.

    # Agent Specs
    * Each instance handle 5 files only, you distribute the load.
    * Please start the agents interactively, i.e. start the cli, then paste/type the prompt intended for that agent and press enter to let it go at it.
    * You want to make sure that they are actually working, by seeing some progress, just in case your launch failed, only then, you job is finished, you don't need to monitor them until they finish.

    Do not use internal subagents. Use `$workflows parallel-agents`, submit each prompt, verify each agent accepted it, then report the Herdr targets and visible status.

createParallelAgents:
  description: Use workflows parallel-agents for an appended requirement.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command for the appended user requirement.

    You are preparing a StackOps external parallel-agent run for the user requirement in the appended prompt.

    Your job:
    1. Read the appended user requirement as the source of truth.
    2. Design the full external-agent split: agent choice, task boundaries, context source, chunking, paths, and agent names.
    3. Create task-specific standalone instructions needed for robust delegation.
    4. Start Herdr-managed interactive agents through `$workflows parallel-agents`.
    5. Submit the intended prompt to each agent and verify each agent accepted it.

    This is an orchestration prompt. Do not pass this prompt itself to spawned agents. Write or select a prompt that tells spawned agents how to do the user's actual work.

    Creation and launch contract:

    - The purpose is to launch external interactive agents through `$workflows parallel-agents`.
    - The purpose is not to create generated `agents parallel create` layout files.
    - Do not use internal subagents.
    - Do not use `agents parallel create`, `agents parallel run-parallel`, `--run`, `--Run`, or `-R`.
    - After launch, report the Herdr targets, task split, and visible status.

    Design rules:

    - Use `codex` unless the user asks for another agent or the task clearly needs another installed agent.
    - Use high reasoning for complex coding/research delegation when the selected agent supports it, unless the user asks otherwise.
    - Prefer one task per agent when isolation matters; group small independent tasks only when that is more efficient.
    - Use short filesystem-safe names for agent labels.
    - Avoid destructive cleanup. If old agent sessions or work dirs exist, choose fresh labels unless the user explicitly requested replacement.
    - Make every agent prompt standalone and include the exact files, commands, or context needed.

    Simple three-agent example:

    Suppose the appended user requirement is: "In a toy calculator project, split work across three agents: implement arithmetic, add tests, and update docs."

    Delegate:

    Agent 1 context:
    Inspect `calculator.py`. Implement or fix `add(a, b)` and `subtract(a, b)`.
    Keep the public function names stable.

    Agent 2 context:
    Inspect `calculator.py`. Implement or fix `multiply(a, b)` and `divide(a, b)`.
    For division by zero, raise `ZeroDivisionError` with a clear message.

    Agent 3 context:
    Inspect the README and tests. Add usage examples for all four calculator operations and add focused tests for the expected behavior.

    Final response after launching:

    - State whether all prompts were accepted.
    - Give the Herdr target names/ids.
    - Summarize each agent's assignment.
    - Mention any agent that failed to start or accept its prompt.

stackopsMaintinanceUpdateInstaller:
  description: Use workflows parallel-agents to update installer filename patterns.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    Goal: coordinate external agents to update GitHub release filename patterns in `src/stackops/utils/schemas/installer/installer_data.json`.
    Split installer entries across agents, with 10 entries per agent. Tell agents to edit only entries assigned to them.

    Tell each agent:
    - If `repoURL` is not a GitHub repository, skip that entry.
    - Verify current release asset names before changing a `fileNamePattern`.
    - Never add a literal `v` before `{version}` just because release tags or assets contain one.
    - Do not touch values that are custom Python installer scripts such as `<name>.py`.
    - Do not touch custom package install commands.
    - Only edit `fileNamePattern` fields.
    - Prefer musl Linux binaries over gnu binaries when both are available.

    Do not use `agents parallel create`, `agents parallel run-parallel`, internal subagents, or generated layout workflows.
    Start Herdr-managed interactive agents, submit their prompts, verify each accepted the prompt, then report the Herdr targets and visible status.

stackopsMaintinanceUpdateTest:
  description: Use workflows parallel-agents to write mirrored runtime tests.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    Goal: coordinate external agents to add focused runtime tests for StackOps Python files.
    Build the work list from git-visible `.py` files, excluding `tests` and ignored/generated directories. Give each agent about 10 files.

    Tell each agent:
    - Use `$caveman wenyan`.
    - Create one test file per assigned Python file.
    - Put tests under `tests/mirror/<same repo-relative path>`.
    - Test runtime behavior that static type checking cannot catch.
    - Do not write tests whose only value is checking type correctness.
    - Keep edits scoped to assigned tests unless a tiny source fix is clearly necessary.

    Do not use `agents parallel create`, `agents parallel run-parallel`, internal subagents, or generated layout workflows.
    Start Herdr-managed interactive agents, submit their prompts, verify each accepted the prompt, then report the Herdr targets and visible status.

stackopsMaintinanceUpdateDocs:
  description: Use workflows parallel-agents to update CLI and API docs.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    Goal: coordinate external agents to update documentation under `docs/cli` and `docs/api`.
    Build the work list from git-visible Markdown files in those two directories. Give agents clear file chunks.

    Tell each agent:
    - Only edit files under `docs/cli` and `docs/api`.
    - Do not edit `docs/index.md`, `docs/quickstart.md`, `docs/guide/**`, Home, User Guide, or other documentation tabs.
    - Treat assigned context entries as docs files to update directly.
    - Inspect current Python sources and CLI/API behavior as needed.
    - Prefer current implemented behavior. Remove stale wording instead of documenting legacy behavior.

    Do not use `agents parallel create`, `agents parallel run-parallel`, internal subagents, or generated layout workflows.
    Start Herdr-managed interactive agents, submit their prompts, verify each accepted the prompt, then report the Herdr targets and visible status.

stackopsMaintinanceUpdateLogic:
  description: Use workflows parallel-agents to review command logic.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    Goal: coordinate external agents to review StackOps CLI command logic and fix real issues.
    Build the work list from CLI command source locations, with each task naming the repo-relative source file and command path.

    Tell each agent:
    - Use the assigned file and command path to find the command.
    - Fix actual logic bugs, inconsistent behavior, or meaningful failure modes.
    - If the command works as is, leave it alone.
    - Keep CLI files fast by moving unnecessary heavy imports into the functions that need them.
    - Do not over-split into tiny shim modules.
    - Use modern Python style, including `| None` instead of `Optional`.
    - Expect other external agents may edit nearby command code.

    Do not use `agents parallel create`, `agents parallel run-parallel`, internal subagents, or generated layout workflows.
    Start Herdr-managed interactive agents, submit their prompts, verify each accepted the prompt, then report the Herdr targets and visible status.

stackopsUpdateAgentsConfig:
  description: Use workflows parallel-agents to update agents add-config outputs, one external agent per supported target.
  prompt: |
    Use the `$workflows` skill with the `parallel-agents` command.

    Please update StackOps `agents add-config` support against the latest official docs for every supported agent.

    This is an orchestration prompt. Start by inspecting the live command, then discover the relevant implementation, templates, privacy helpers, and tests from the repository:
    - `uv run stackops agents add-config --help`
    - Use fast repository search to find the command registration, implementation, generated templates, privacy config helpers, and tests.
    - Do not assume file locations from this prompt; verify the current source layout before editing.

    Determine the supported `agents add-config --agent` values from the live command and current source. Do not rely on this prompt for a hardcoded agent list.

    After determining the supported values, launch Herdr-managed interactive agents through `$workflows parallel-agents`:
    - Start exactly one external agent per supported `agents add-config --agent` value.
    - Give each spawned agent one supported target only, and name the Herdr target after that assigned target.
    - Do not group multiple supported targets into one spawned agent.
    - Do not split one supported target across multiple spawned agents unless the user explicitly asks for that later.
    - Do not use internal subagents, `agents parallel create`, `agents parallel run-parallel`, generated layout workflows, `--run`, `--Run`, or `-R`.
    - Submit every spawned-agent prompt and verify each agent accepted it before reporting launch status.

    Tell each spawned agent to handle only its assigned supported target:
    - Look up the latest official documentation for repository config, user config, instruction files, ignore files, privacy/telemetry controls, and any required config file names or locations.
    - Prefer primary sources: official docs, official repos, and current CLI `--help` output.
    - Compare the docs against what StackOps currently writes through `agents add-config`.
    - Update generated config/instruction templates only where current StackOps output is stale, missing, or wrong.
    - Configure maximum privacy wherever the agent supports it: disable telemetry, analytics, training/data sharing, prompt logging, crash/upload reporting, and remote diagnostics.
    - Give the local agent maximum execution autonomy wherever the agent supports it: full tool/file/shell powers, no permission prompts, and no approval prompts.
    - Keep generated defaults minimal, portable, and safe to commit unless the file is intentionally private.
    - Preserve existing tests where behavior is still correct, and add focused tests for changed generated outputs or content.
    - Do not make cosmetic rewrites unrelated to agent config correctness.
    - Expect other external agents may edit adjacent agent config code or shared tests; keep changes scoped to the assigned target and reconcile conflicts conservatively.

    Final response:
    - List each agent checked.
    - Report the Herdr target for each spawned agent and whether its prompt was accepted.
    - Summarize which config outputs changed.
    - Cite or name the official documentation used for any behavior change.
