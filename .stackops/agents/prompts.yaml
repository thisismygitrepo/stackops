# yaml-language-server: $schema=./prompts.schema.json
# prompts.yaml used by `agents run-prompt`
# Top-level keys show up in interactive selection.
# Nested keys can be selected via --context-name with dot-path syntax (example: team.backend).
# Each entry can be a plain string or an object with prompt metadata.
# entryExample: {prompt: replace me, description: short label}

ensureLightweightCommands:
  description: we want typer cli files to remain light weight and prevent uncncessary upfront loading.
  prompt: |
    $caveman weynan full.
    Please look into every cli typer py file that has (import typer).
    For each one, please spin up another veresion of you (whether you are codex, claude, opencode, copilot etc)
    but not as a sub agent, instead, the new instances go to new panes/windows in this tmux session
    Each instance handle one file that you deem problematic and you hand it over to that agent to fix.
    In essense, we want to ensure that those typer cli remain lightweight so user doesn't experience delay.
    We achieve this by,
    * Avoid unncessary import to happen upfront, e.g. if only one command needs it, then the import can occur within that command.
    * Only include imports needed to type hint the variables, and ensuer they come from modules that are lightweight themselves, otherwise some redesign need to occur with those imported files.
    * We want to have both python API and CLI experirence of functions, so, the actual py function must exist somewhere, and the cli function is only calling that function internally and passing on (a cli interface to an existing py function).
    Convey those messages to the new agent instances, but its up to you to decide which one is worth working on and which one is already reasonably optimized, plese don't be overzelous.
    

createParallelAgents:
      description: Design args and create an agents layout only, without launching it
      prompt: |
        You are preparing a StackOps parallel-agent layout for the user requirement in the appended prompt.

        Your job:
        1. Read the appended user requirement as the source of truth.
        2. Design the full `agents parallel create` invocation: agent choice, prompt source, context source, chunking, paths, and output names.
        3. Create task-specific prompt/context input files needed for a robust command.
        4. Execute only the `agents parallel create` command yourself so the layout and agent files are generated.
        5. Stop there. Do not launch the generated layout, do not start agents, and do not run the generated terminal layout.

        This is an orchestration prompt. Do not pass this prompt itself to the spawned agents via `--prompt-name agents.parallel.create` unless the user explicitly asks for a layout that creates more layouts. Write or select a prompt that tells the spawned agents how to do the user's actual work.

        Command:

        ```bash
        agents parallel create [OPTIONS]
        ```

        If you are running from the StackOps source checkout and the `agents` executable is not available, use:

        ```bash
        uv run agents parallel create [OPTIONS]
        ```

        Creation-only contract:

        - The purpose is to create files: input files, per-agent task files, and the layout JSON.
        - The purpose is not to run the workload. Do not start terminals, do not launch agents, and do not execute any generated agent commands.
        - Hard rule: never include `--run`, `--Run`, or `-R`.
        - The final `agents parallel create` command must only create the layout and supporting files.
        - After it succeeds, report the generated layout path and the command the user can run later if they want to launch it.

        Before designing args, inspect the live command help:

        ```bash
        agents parallel create --help
        ```

        Treat the live help as the authority for option names, defaults, accepted enum values, and mutual exclusions. Do not rely on memory if help output differs from this prompt.

        Design rules that help output will not decide for you:

        - Use `codex` unless the user asks for another agent or the task clearly needs another installed agent.
        - Use high reasoning for complex coding/research layout generation when the selected agent supports it, unless the user asks otherwise.
        - Prefer a task-specific prompt file over a long inline prompt.
        - Prefer a context file over a context directory when paths, task boundaries, or per-chunk instructions matter.
        - Do not rely on implicit context defaults; provide explicit context unless you have verified the default file exists and is correct.
        - Make the context file use the same separator you pass to the command.
        - Use one task per agent when isolation matters; group small independent tasks only when that is more efficient.
        - Use a short filesystem-safe job name. Prefer a unique name when an existing `.ai/agents/<job-name>` directory could cause cleanup prompts.
        - Save a reusable YAML entry only when the user asks for a reusable workflow.
        - Avoid interactive mode unless the user explicitly wants it.

        Input-file pattern:

        - For long prompts, write a prompt file such as `.ai/agents/_inputs/<job-name>/prompt.md`.
        - For multiple work items, write a context file such as `.ai/agents/_inputs/<job-name>/context.md`.
        - Separate context work items with the chosen separator, commonly a line containing `@-@`.
        - Keep generated input files outside the final `--agents-dir` when you pass `--agents-dir`, so creating the input files does not make the agent directory pre-exist.

        Simple three-agent example:

        Suppose the appended user requirement is: "In a toy calculator project, split work across three agents: implement arithmetic, add tests, and update docs."

        Create a shared prompt file at `.ai/agents/_inputs/toy-calculator-ops/prompt.md`:

        ```markdown
        You are one agent in a parallel StackOps workflow for a toy calculator project.

        Use only your assigned context chunk as your task boundary.
        Make the requested change, keep edits scoped, add or update tests when your chunk asks for them, and report the files you changed.
        ```

        Create a context file at `.ai/agents/_inputs/toy-calculator-ops/context.md` with one chunk per intended agent:

        ```markdown
        Agent 1 context:
        Inspect `calculator.py`. Implement or fix `add(a, b)` and `subtract(a, b)`.
        Keep the public function names stable.
        @-@
        Agent 2 context:
        Inspect `calculator.py`. Implement or fix `multiply(a, b)` and `divide(a, b)`.
        For division by zero, raise `ZeroDivisionError` with a clear message.
        @-@
        Agent 3 context:
        Inspect the README and tests. Add usage examples for all four calculator operations and add focused tests for the expected behavior.
        ```

        Then create the layout only:

        ```bash
        uv run agents parallel create \
          --agent codex \
          --reasoning high \
          --job-name toy-calculator-ops \
          --prompt-path .ai/agents/_inputs/toy-calculator-ops/prompt.md \
          --context-path .ai/agents/_inputs/toy-calculator-ops/context.md \
          --separator '@-@' \
          --agent-load 1
        ```

        In that example, the prompt is shared by all spawned agents. The context is split at each `@-@` separator. Because there are three context chunks and `--agent-load 1`, StackOps creates three agent tasks: agent 1 receives only the first chunk, agent 2 receives only the second chunk, and agent 3 receives only the third chunk. The command creates the layout; it does not run the agents because `--run` is intentionally omitted.

        Command construction checklist:

        - Choose a concrete `--job-name`.
        - Choose exactly one of `--prompt`, `--prompt-path`, or `--prompt-name`.
        - Choose at most one of `--context` or `--context-path`; normally use `--context-path`.
        - Ensure `--agent-load` and `--separator` match how you split the context.
        - Use shell-safe quoting for paths and values.
        - Avoid destructive cleanup. If a target agent directory exists, choose a new job name or output directory unless the user explicitly requested replacement.
        - Run `agents parallel create --help` if local behavior appears different from this prompt.
        - Run the final `agents parallel create` command without `--run`.

        Final response after running:

        - State the command succeeded or explain the failure.
        - Give the layout path and agents directory.
        - Mention that the layout was not launched because `--run` was intentionally omitted.
