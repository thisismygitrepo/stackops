name: Build and Publish to PyPI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # For testing the workflow on PRs, but won't publish

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      publish-needed: ${{ steps.check-version.outputs.publish-needed }}
      package-name: ${{ steps.check-version.outputs.package-name }}
      current-version: ${{ steps.check-version.outputs.current-version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Check if current version needs publishing
      id: check-version
      run: |
        uv run --no-sync python - <<'PY'
        import json
        import os
        import tomllib
        import urllib.error
        import urllib.parse
        import urllib.request
        from pathlib import Path

        output_path = Path(os.environ["GITHUB_OUTPUT"])
        pyproject = tomllib.loads(Path("pyproject.toml").read_text())
        project = pyproject["project"]
        package_name = project["name"]
        current_version = project["version"]

        package_url = urllib.parse.quote(package_name, safe="")
        pypi_url = f"""https://pypi.org/pypi/{package_url}/json"""

        try:
            with urllib.request.urlopen(pypi_url, timeout=20) as response:
                releases = json.load(response)["releases"]
                publish_needed = current_version not in releases
        except urllib.error.HTTPError as error:
            if error.code != 404:
                raise
            publish_needed = True

        with output_path.open("a") as output_file:
            output_file.write(f"""package-name={package_name}\n""")
            output_file.write(f"""current-version={current_version}\n""")
            output_file.write(f"""publish-needed={str(publish_needed).lower()}\n""")

        if publish_needed:
            print(f"""{package_name} {current_version} is not on PyPI yet.""")
        else:
            print(f"""{package_name} {current_version} is already on PyPI.""")
        PY

  build-and-publish:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.publish-needed == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Clean previous build artifacts
      run: |
        echo "🧹 Cleaning previous build artifacts..."
        rm -rf dist/ build/ *.egg-info/

    - name: Build package
      run: |
        echo "🔨 Building package..."
        uv build

    - name: List built artifacts
      run: |
        echo "📦 Listing built artifacts:"
        ls -la dist/

    - name: Publish to PyPI
      env:
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: |
        if [ -n "$PYPI_TOKEN" ]; then
          echo "🚀 Publishing to PyPI with PYPI_TOKEN..."
          uv publish --token "$PYPI_TOKEN"
        else
          echo "🚀 Publishing to PyPI with trusted publishing..."
          uv publish --trusted-publishing always
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.check-version.outputs.current-version }}
        name: Release v${{ needs.check-version.outputs.current-version }}
        body: |
          ## Changes
          
          Version ${{ needs.check-version.outputs.current-version }} has been released and published to PyPI.
          
          Install with:
          ```bash
          pip install ${{ needs.check-version.outputs.package-name }}==${{ needs.check-version.outputs.current-version }}
          ```
          
          Or with uv:
          ```bash
          uv add ${{ needs.check-version.outputs.package-name }}==${{ needs.check-version.outputs.current-version }}
          ```
        files: |
          dist/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-build:
    needs: check-version
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && needs.check-version.outputs.publish-needed == 'false')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up venv
      run: uv sync --no-dev

    - name: Clean previous build artifacts
      run: |
        echo "🧹 Cleaning previous build artifacts..."
        rm -rf dist/ build/ *.egg-info/

    - name: Test build package
      run: |
        echo "🔨 Testing package build..."
        uv build

    - name: List built artifacts
      run: |
        echo "📦 Listing built artifacts:"
        ls -la dist/
        
    - name: Test package installation
      run: |
        echo "🧪 Testing package installation..."
        uv sync --no-dev
        source .venv/bin/activate
        uv pip install dist/*.whl
        python -c "import stackops; print('✅ Package imports successfully')"
