[project]
site_name = "Machineconfig"
site_description = "A CLI-based cross-platform Stack Manager - Package Manager, Configuration Manager, Automation Tool, Dotfiles Manager, and more"
site_author = "Alex Al-Saffar"
site_url = "https://thisismygitrepo.github.io/machineconfig/"
repo_name = "thisismygitrepo/machineconfig"
repo_url = "https://github.com/thisismygitrepo/machineconfig"
edit_uri = "edit/main/docs/"
copyright = """
Copyright &copy; 2024 Alex Al-Saffar
"""
extra_css = ["stylesheets/extra.css"]
nav = [
  { Home = [
    { Welcome = "index.md" },
    { Installation = "installation.md" },
    { Quickstart = "quickstart.md" },
    { Hosting = "hosting.md" },
  ] },
  { "User Guide" = [
    { Overview = "guide/overview.md" },
    { "Package Management" = "guide/packages.md" },
    { "Configuration Management" = "guide/configuration.md" },
    { Dotfiles = "guide/dotfiles.md" },
    { "Data Sync" = "guide/data-sync.md" },
    { Automation = "guide/automation.md" },
  ] },
  { "CLI Reference" = [
    "cli/index.md",
    { mcfg = "cli/mcfg.md" },
    { devops = "cli/devops.md" },
    { cloud = "cli/cloud.md" },
    { sessions = "cli/sessions.md" },
    { agents = "cli/agents.md" },
    { utils = "cli/utils.md" },
    { fire = "cli/fire.md" },
  ] },
  { "API Reference" = [
    "api/index.md",
    { Cluster = [
      "api/cluster/index.md",
      { Remote = "api/cluster/remote.md" },
      { Sessions = "api/cluster/sessions.md" },
    ] },
    { Jobs = [
      "api/jobs/index.md",
      { Installer = "api/jobs/installer.md" },
    ] },
    { Utils = [
      "api/utils/index.md",
    ] },
  ] },
  { Contributing = [
    "contributing/index.md",
    { "Development Setup" = "contributing/development.md" },
    { "Code Style" = "contributing/code-style.md" },
  ] },
  { Changelog = "changelog.md" },
]

[project.theme]
variant = "classic"
custom_dir = "docs/overrides"
language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"
logo = "material/package-variant-closed"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/thisismygitrepo/machineconfig"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/machineconfig/"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
merge_init_into_class = true
show_signature_annotations = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
separate_signature = true
show_root_heading = true
show_root_full_path = false
show_source = true
members_order = "source"
heading_level = 2

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true

[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
title = "On this page"
toc_depth = 3

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]
normalize_issue_symbols = true
repo_url_shorthand = true
user = "thisismygitrepo"
repo = "machineconfig"

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["docs_fragments/abbreviations.txt"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
